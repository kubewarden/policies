rules:
  - apiGroups:
      - policies.kubewarden.io
    apiVersions:
      - v1
    resources:
      - admissionpolicies
      - admissionpolicygroups
    operations:
      - CREATE
      - UPDATE
mutating: true
backgroundAudit: false
executionMode: kubewarden-wapc
contextAwareResources:
  - apiVersion: v1
    kind: Namespace
annotations:
  # artifacthub specific
  io.artifacthub.displayName: Namespace to PolicyServer mapper
  io.artifacthub.resources: AdmissionPolicy,AdmissionPolicyGroup
  io.artifacthub.keywords: namespace, policies, policyserver, admissionpolicy, admissionpolicygroup
  # kubewarden specific
  io.kubewarden.policy.ociUrl: ghcr.io/kubewarden/policies/ns-policyserver-mapper
  io.kubewarden.policy.title: ns-policyserver-mapper
  io.kubewarden.policy.version: 0.1.2
  io.kubewarden.policy.description: >
    Mutates AdmissionPolicy and AdmissionPolicyGroup resources to enforce the PolicyServer they run on. The target PolicyServer is read from the `admission.kubewarden.io/policy-server` label of the Namespace where the policy is being created or updated. Requests are rejected when the label is absent, preventing policies from being scheduled on an unintended PolicyServer.

  io.kubewarden.policy.url: https://github.com/kubewarden/policies
  io.kubewarden.policy.source: https://github.com/kubewarden/policies
  io.kubewarden.policy.author: Kubewarden developers <cncf-kubewarden-maintainers@lists.cncf.io>
  io.kubewarden.policy.license: Apache-2.0
  io.kubewarden.policy.category: namespace
  io.kubewarden.policy.severity: high
  com.github.release.tag: ns-policyserver-mapper-policy/v0.1.2
