# Kubewarden Artifacthub Package config
#
# Use this config to submit the policy to https://artifacthub.io.
#
# This config can be saved to its default location with:
#   kwctl scaffold artifacthub > artifacthub-pkg.yml 
version: 1.0.6
name: probes-policy
displayName: Probes validator policy
createdAt: 2026-07-13T14:07:05.111029564Z
description: This policy validates that all containers have livenessProbe and readinessProbe defined.
license: Apache-2.0
homeURL: https://github.com/kubewarden/policies
containersImages:
- name: policy
  image: ghcr.io/kubewarden/policies/probes:v1.0.6
links:
- name: policy
  url: https://github.com/kubewarden/policies/releases/download/probes-policy%2Fv1.0.6/policy.wasm
- name: source
  url: https://github.com/kubewarden/policies
install: |
  The policy can be obtained using [`kwctl`](https://github.com/kubewarden/kwctl):
  ```console
  kwctl pull ghcr.io/kubewarden/policies/probes:v1.0.6
  ```
  Then, generate the policy manifest and tune it to your liking. For example:
  ```console
  kwctl scaffold manifest -t ClusterAdmissionPolicy registry://ghcr.io/kubewarden/policies/probes:v1.0.6
  ```
maintainers:
- name: Kubewarden developers
  email: cncf-kubewarden-maintainers@lists.cncf.io
provider:
  name: kubewarden
recommendations:
- url: https://artifacthub.io/packages/helm/kubewarden/kubewarden-controller
annotations:
  kubewarden/mutation: 'false'
  kubewarden/rules: |
    - apiGroups:
      - ''
      apiVersions:
      - v1
      resources:
      - pods
      operations:
      - CREATE
