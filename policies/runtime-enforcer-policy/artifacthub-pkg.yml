# Kubewarden Artifacthub Package config
#
# Use this config to submit the policy to https://artifacthub.io.
#
# This config can be saved to its default location with:
#   kwctl scaffold artifacthub > artifacthub-pkg.yml 
version: 0.1.3
name: runtime-enforcer
displayName: WorkloadPolicy config verifier
createdAt: 2026-07-13T14:22:36.861697861Z
description: Policy that enforces runtime-enforcer policies to be present when a workload is created
license: Apache-2.0
homeURL: https://github.com/kubewarden/policies
containersImages:
- name: policy
  image: ghcr.io/kubewarden/policies/runtime-enforcer:v0.1.3
keywords:
- deployment
- replicaset
- statefulset
- daemonset
- job
- cronjob
- pod
- runtime-enforcer
links:
- name: policy
  url: https://github.com/kubewarden/policies/releases/download/runtime-enforcer-policy%2Fv0.1.3/policy.wasm
- name: source
  url: https://github.com/kubewarden/policies
install: |
  The policy can be obtained using [`kwctl`](https://github.com/kubewarden/kwctl):
  ```console
  kwctl pull ghcr.io/kubewarden/policies/runtime-enforcer:v0.1.3
  ```
  Then, generate the policy manifest and tune it to your liking. For example:
  ```console
  kwctl scaffold manifest -t ClusterAdmissionPolicy registry://ghcr.io/kubewarden/policies/runtime-enforcer:v0.1.3
  ```
maintainers:
- name: Kubewarden developers
  email: cncf-kubewarden-maintainers@lists.cncf.io
provider:
  name: kubewarden
recommendations:
- url: https://artifacthub.io/packages/helm/kubewarden/kubewarden-controller
annotations:
  kubewarden/contextAwareResources: |
    - apiVersion: security.rancher.io/v1alpha1
      kind: WorkloadPolicy
  kubewarden/mutation: 'false'
  kubewarden/questions-ui: |
    questions:
    - default: null
      description: >-
        This policy is designed to enforce runtime-enforcer policies to be
        present when a Kubernetes workload is deployed.
      group: Settings
      label: Description
      required: false
      hide_input: true
      type: string
      variable: description
  kubewarden/resources: Pod, Deployments, Replicaset, Statefulset, Daemonset, Job, Cronjob
  kubewarden/rules: |
    - apiGroups:
      - ''
      apiVersions:
      - v1
      resources:
      - pods
      operations:
      - CREATE
      - UPDATE
    - apiGroups:
      - apps
      apiVersions:
      - v1
      resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
      operations:
      - CREATE
      - UPDATE
    - apiGroups:
      - batch
      apiVersions:
      - v1
      resources:
      - jobs
      - cronjobs
      operations:
      - CREATE
      - UPDATE
